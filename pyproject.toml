[build-system]
requires = ["scikit-build-core", "pybind11", "cmake>=3.25"]
build-backend = "scikit_build_core.build"

[project]
name = "desbordante"
version = "2.4.1"
description = "Science-intensive high-performance data profiler"
requires-python = ">=3.8"
readme = "README_PYPI.md"
license = { text = "AGPL-3.0-only" }

classifiers = [
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",    
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

urls = { homepage = "https://desbordante.unidata-platform.ru/", repository = "https://github.com/desbordante/desbordante-core", issues = "https://github.com/desbordante/desbordante-core/issues" }

[tool.scikit-build.cmake.define]
DESBORDANTE_BINDINGS = "INSTALL"
DESBORDANTE_BUILD_NATIVE = "OFF"
DESBORDANTE_BUILD_TESTS = "OFF"
DESBORDANTE_UNPACK_DATASETS = "OFF"
ASAN = "OFF"
CMAKE_BUILD_TYPE = "Release"
CPM_SOURCE_CACHE = {env="CPM_SOURCE_CACHE", default = "./cmake/cpm-cache"}

[tool.scikit-build.sdist]
include = ["lib/*"]
exclude = [
    "datasets/*",
    "images/*",
    "pull_datasets.sh",
    "docs/*",
    "build.sh",
    "build.bat",
    "test_input_data/",
    "src/tests/*",
    "examples/*",
]

[tool.ruff]
# line-length: 120 instead of default 88
# Reason: Examples often have long f-strings with column names, URLs, table data
# that are more readable on one line than split across multiple lines.
# Also allows for better formatted output in demonstration scripts.
line-length = 120
target-version = "py38"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "Q",   # quotes
    "T",   # print statements
    "D",   # docstrings
    "S",   # bandit security
    "I",   # sort imports properly
    "UP",  # modernize Python syntax (safe for 3.8+)
    "ISC", # good use of string concatenation
    "ICN", # use common import conventions
]
# Ignore rules that are too strict for examples/notebooks:
# - Q000: requires double quotes (examples use single quotes for consistency)
# - Q001: single quote multiline strings (used for output formatting)
# - Q002: move single-quoted strings to double (related to Q001)
# - Q003: change outer quotes to avoid escaping (examples use escaped quotes)
# - T201: warns about print() (examples use print for output demonstration)
# - D100: missing docstring in public module (examples are scripts, not libraries)
# - D101: missing docstring in public class (simple example classes)
# - D102: missing docstring in public method (example methods prioritize clarity)
# - D103: missing docstring in public function (simple helper functions)
# - D104: missing docstring in public nested (helper functions in examples)
# - D107: missing docstring in __init__ (simple init methods)
# - D203: one blank line required before class docstring
#         (conflicts with D211: no blank line required before class)
# - D210: one-line docstring should fit on first line (formatting preference)
# - D212: summary must start at first line of multiline docstring
#         (conflicts with D213: summary must start at second line)
# - D300: use triple double quotes (benchmark uses single quotes)
# - D400: one-line docstring does not match summary (formatting preference)
# - D413: bad multiline summary (formatting preference)
# - D415: section underline (formatting preference)
# - S101: use of assert detected (examples use assert for test demonstrations)
# - S603: use of subprocess call (not a security issue in examples)
ignore = [
    "Q000", "Q001", "Q002", "Q003",
    "T201",
    "D100", "D101", "D102", "D103", "D104", "D107", "D203", "D210", "D212", "D213",
    "D300", "D400", "D413", "D415",
    "S101", "S603",
]

exclude = [
    ".git",
    "build/",
]

[tool.ruff.lint.per-file-ignores]
# E702: Multiple statements on one line (e.g., G.add_node(); G.add_edge())
"examples/**/*.py" = ["E501", "E702"]
# Notebooks have generated cell code with unique scoping
# E501: Long lines in cell outputs
# E731: lambda assigned to variable (cell-specific pattern)
# F401, F811, F821: Unused imports/redefinitions (cell scoping)
"examples/notebooks/*.ipynb" = ["E501", "E731", "F401", "F811", "F821"]
