name: Performance tests
on:
  # Note: schedule only triggers on `main` branch
  schedule:
    - cron: 30 3 * * 6
  workflow_dispatch:

concurrency:
  # ref will be always the same (`main`) for schedule, and can be set manually for workflow-dispatch
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress runs when a new workflow with the same group name is triggered
  cancel-in-progress: true

jobs:
  performance-tests:
    runs-on: ubuntu-latest
    env:
      # Number of run IDs to select
      num-runs: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        uses: ./.github/composite-actions/install-dependencies
        with:
          os: ubuntu-latest
          toolset: gcc
      - name: Download datasets
        uses: ./.github/composite-actions/download-datasets
      - name: Build
        run: |
          export CXX=g++-10
          ./build.sh --perf-tests --no-tests

      - name: Get run IDs
        working-directory: ${{ github.workspace }}
        run: |
          curl -L \
            -o runs.json \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            'https://api.github.com/repos/${{ github.repository }}/actions/workflows/performance-tests.yml/runs?exclude_pull_requests=true'

          # [0] is current job
          jq -c '[.workflow_runs.[].id][1:${{ env.num-runs }} + 1]' runs.json > ids.json

          echo -n "IDs: "
          cat ids.json
      - name: Get previous results
        run: |
          for (( i = 0; i < 10; i = $i + 1 )); do
            ID=$(jq ".[$i]" ids.json)

            curl -L \
              -o artifacts.json \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$ID/artifacts"

            ARTIFACT_ID=$(jq '.artifacts.[] | select(.name == "results.json") | .id' artifacts.json)
            if [[ -n "$ARTIFACT_ID" ]]; then
              curl -L \
                -o artifact.zip \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.TEST_READONLY_TOKEN }}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip"

              mkdir -p old-results
              unzip -p artifact.zip > old-results/$i.json
            else
              echo "Job $ID has no artifacts named 'results.json'"
            fi
          done

      - name: Get latest log
        working-directory: ${{ github.workspace }}
        run: |
          FILENAME=old-results/$(ls old-results | head -n 1)
          if [[ -n "$FILENAME" ]]; then
            cp $FILENAME latest.json
          else
            echo "No artifacts found!"
            echo '{}' > latest.json
          fi
      - name: Test
        working-directory: ${{github.workspace}}/build/target
        run: |
          ./Desbordante_perf_test ${{ github.workspace }}/latest.json \
            ${{ github.workspace }}/curr-results.json
      # All next steps should be runned even if this one has failed
      # Some of them may fail in that case, but it's not a problem
      - uses: actions/upload-artifact@v4
        with:
          name: results.json
          path: curr-results.json
        if: ${{ !cancelled() }}

      - name: Install matplotlib
        run: sudo apt install -y python3-matplotlib
        if: ${{ !cancelled() }}
      - name: Build plots
        working-directory: ${{ github.workspace }}
        run: |
          python3 src/tests/performance_tests/display_performance_tests.py old-results \
            curr-results.json plots.pdf
        if: ${{ !cancelled() }}
      - uses: actions/upload-artifact@v4
        with:
          name: plots.pdf
          path: ${{ github.workspace }}/plots.pdf
          if-no-files-found: error
        if: ${{ !cancelled() }}
