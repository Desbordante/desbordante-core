name: Codestyle
on:
  pull_request:
    paths-ignore:
      - docs/**
      - README.md
      - README_PYPI.md
      - cli/**
      - examples/**
      - images/**
      - .gitignore
      - COPYING
      - build.*
      - pyproject.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  # Cancel in-progress runs when a new workflow with the same group name is triggered
  cancel-in-progress: true

jobs:
  clang-format-check:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Pull clang-format
        run: |
          sudo add-apt-repository 'deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main'
          wget https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo apt-key add llvm-snapshot.gpg.key
          sudo apt-get update
          sudo apt-get install -y clang-format-22
      - name: Check formatting
        run: |
          set +e
          files=$(git diff --name-only origin/$GITHUB_BASE_REF...HEAD \
            -- ':(exclude)*.ipynb' ':(exclude)*.json' ':(exclude)*.md' || true)

          if [ -z "$files" ]; then
            echo "### No files to check for formatting :heavy_check_mark:" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          formatterOutput=$( git diff -U0 origin/$GITHUB_BASE_REF...HEAD -- $files | clang-format-diff-22 -p 1)

          if [ "$formatterOutput" != "" ]
          then
            echo ":x: :x: :x:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`c++" >> $GITHUB_STEP_SUMMARY
            echo "$formatterOutput" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$formatterOutput"
            exit 1
          fi

          echo "$formatterOutput"
          echo "### $formatterOutput :heavy_check_mark:" >> $GITHUB_STEP_SUMMARY

  clang-tidy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        uses: ./.github/composite-actions/install-dependencies
        with:
          os: ubuntu
          toolset: gcc
          download-pybind: true
      - name: Generate compile_commands.json
        run: |
          cmake -DCMAKE_CXX_COMPILER=g++-10 \
            -DCMAKE_BUILD_TYPE=Debug \
            -Dgtest_disable_pthreads=OFF \
            -DDESBORDANTE_BINDINGS=BUILD \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCPM_SOURCE_CACHE=${{github.workspace}}/cmake/cpm-cache \
            -S . -B ${{github.workspace}}/build

      - uses: ZedThree/clang-tidy-review@v0.23.1
        id: review
        with:
          apt_packages: libboost-dev,python3-dev
          build_dir: build
          config_file: '.clang-tidy'
          include: "*.c,*.cc,*.cpp,*.cxx"
          split_workflow: true

      - uses: ZedThree/clang-tidy-review/upload@v0.23.1

      - name: Fail the check if clang-tidy reported issues
        if: steps.review.outputs.total_comments > 0
        run: exit 1

  cmake-format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install cmake-format
          sudo apt-get update
          sudo apt-get install -y cmake-format

      - name: Check CMake formatting
        run: |
          set +e

          files=$(find . -name "CMakeLists.txt" -o -name "*.cmake" | grep -v "cmake/CPM.cmake")

          cmake-format --check $files

          if [ -z "$files" ]; then
            echo "### No CMake files to check :heavy_check_mark:" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          if [ $? -ne 0 ]; then
            echo ":x: CMake files are not properly formatted" >> $GITHUB_STEP_SUMMARY
            echo "Run 'cmake-format -i' on the following files:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$files" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### CMake files are properly formatted :heavy_check_mark:" >> $GITHUB_STEP_SUMMARY

  typos-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spelling with typos
        uses: crate-ci/typos@v1.43.5
